name: Publish benchmark site

# Keeps GitHub Pages (gh-pages branch -> haixuantao.github.io/sim2sim) in
# lockstep with the generated results page on main. Fires whenever
# make_site.py's output is committed; gh-pages holds only the generated
# index.html, force-pushed as a single-commit artifact branch.

on:
  push:
    branches: [main]
    paths:
      - examples/cube_drop/site/index.html
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Push site to gh-pages
        run: |
          mkdir /tmp/site
          cp examples/cube_drop/site/index.html /tmp/site/index.html
          cd /tmp/site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Publish benchmark site from ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
