name: Publish benchmark site

# Keeps GitHub Pages (gh-pages branch -> haixuantao.github.io/sim2sim) in
# lockstep with the generated results page on main. Fires whenever
# make_site.py's output is committed; gh-pages holds the generated index.html
# plus the videos it references, force-pushed as a single-commit artifact
# branch.
#
# The page is authored for file:// inside a checkout, so its video refs are
# repo-relative (../cube_x.mp4). Served from the gh-pages root at /sim2sim/
# those resolve above the project and 404, so publish_assets.py copies each
# referenced video next to index.html and flattens the ref. Videos that are
# gitignored simply stay missing -- those cards 404 as they always have.

on:
  push:
    branches: [main]
    paths:
      - examples/cube_drop/site/index.html
      - examples/cube_drop/**.mp4
      - examples/lerobot_legs/**.mp4
      - .github/scripts/publish_assets.py
      - .github/workflows/publish-benchmark-site.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Stage site + referenced videos
        run: python .github/scripts/publish_assets.py /tmp/site
      - name: Push site to gh-pages
        run: |
          cd /tmp/site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish benchmark site from ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
