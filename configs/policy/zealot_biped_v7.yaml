# zealot walking_policy_v7 (github.com/haixuanTao/zealot, release biped-policy-v7).
# Obs normalizer is baked into the ONNX graph, so every scale is 1.0. The
# 45-dim layout and gait period follow the release MODEL_CARD.md exactly.
onnx_path: /tmp/claude-1000/-home-xavier-Documents-work-zealot/715c8ded-6fcc-4ab1-ab3d-8cd3e076947d/scratchpad/policy/walking_policy_v7.onnx

obs_terms:
  - { name: last_action,           scale: 1.0 }   #  0-11
  - { name: velocity_command_pad4, scale: 1.0 }   # 12-15 [vx, vy, yaw, 0]
  - { name: joint_pos_rel,         scale: 1.0 }   # 16-27
  - { name: joint_vel,             scale: 1.0 }   # 28-39
  - { name: projected_gravity,     scale: 1.0 }   # 40-42
  - { name: gait_clock,            scale: 1.0 }   # 43-44

gait_period: 0.9   # v7 (v6 uses 0.7)
gait_dt: 0.02      # 50 Hz policy rate

command_ranges:
  lin_vel_x: [0.3, 0.3]
  lin_vel_y: [0.0, 0.0]
  ang_vel_z: [0.0, 0.0]

clip_actions: 5.0
